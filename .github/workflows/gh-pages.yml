# コンテナイメージを container2wasm で WASI に変換し、gzip 分割パーツと
# 静的ファイルからサイトを組み立てて GitHub Pages にデプロイする。
name: Build and deploy to Pages

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  C2W_VERSION: v0.8.4
  IMAGE: ghcr.io/u1f992/vivliostyle-slim:v11.0.4-4
  # ゲスト VM のメモリ。上限の根拠は README の「wasmの生成」を参照
  VM_MEMORY_SIZE_MB: "2000"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # c2w の変換 (エミュレータや Linux カーネルのビルドを含む) は
      # ディスクを大量に使うため、ランナーのプリインストールを削って確保する
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          df -h

      - name: Download container2wasm release
        run: |
          cd /tmp
          curl -fsSLO "https://github.com/container2wasm/container2wasm/releases/download/${C2W_VERSION}/container2wasm-${C2W_VERSION}-linux-amd64.tar.gz"
          curl -fsSLO "https://github.com/container2wasm/container2wasm/releases/download/${C2W_VERSION}/c2w-net-proxy.wasm"
          curl -fsSLO "https://github.com/container2wasm/container2wasm/releases/download/${C2W_VERSION}/SHA256SUMS"
          grep -E "(container2wasm-${C2W_VERSION}-linux-amd64\.tar\.gz|c2w-net-proxy\.wasm)$" SHA256SUMS | sha256sum -c -
          tar -xzf "container2wasm-${C2W_VERSION}-linux-amd64.tar.gz" c2w

      - name: Build wrapper image
        run: docker build -t vivliostyle-slim-root -f Dockerfile.rootwrap .

      # SOURCE_REPO の上書きは c2w v0.8.4 リリースの埋め込み Dockerfile が
      # organization 移行前の ktock/container2wasm を参照しているため
      # (v0.8.4 タグは移行先にしか存在せず、そのままでは assets の clone に失敗する)
      - name: Convert image to wasm
        run: >-
          /tmp/c2w
          --build-arg "VM_MEMORY_SIZE_MB=${VM_MEMORY_SIZE_MB}"
          --build-arg "SOURCE_REPO=https://github.com/container2wasm/container2wasm"
          vivliostyle-slim-root "$PWD/out.wasm"

      - name: Assemble site
        run: |
          ./make-parts.sh out.wasm
          mkdir -p site
          cp index.html main.js demo-worker.js stack.js stack-worker.js \
             worker-util.js wasi-util.js coi-serviceworker.js site/
          cp -r browser_wasi_shim site/
          cp /tmp/c2w-net-proxy.wasm site/
          mv wasm wasm-manifest.json site/
          du -sh site
          df -h

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
